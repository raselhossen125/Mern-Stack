<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Home Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f7fa;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: #222;
            color: white;
        }

        nav h2 {
            color: #4CAF50;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li {
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(to right, #4CAF50, #2ecc71);
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .hero button {
            padding: 12px 25px;
            border: none;
            background: white;
            color: #4CAF50;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .hero button:hover {
            background: #ddd;
        }

        /* Features */
        .features {
            padding: 50px;
            text-align: center;
        }

        .features h2 {
            margin-bottom: 30px;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #4CAF50;
        }

        /* Footer */
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h2>MyWebsite</h2>
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Contact</li>
    </ul>
</nav>

<!-- Hero Section -->
<section class="hero">
    <h1>Welcome to My Website</h1>
    <p>Build something amazing with modern design</p>
    <button onclick="showAlert()">Get Started</button>
</section>

<!-- Features -->
<section class="features">
    <h2>Our Features</h2>
    <div class="card-container">
        <div class="card">
            <h3>Fast</h3>
            <p>Super fast performance and smooth UI.</p>
        </div>
        <div class="card">
            <h3>Responsive</h3>
            <p>Works on mobile, tablet and desktop.</p>
        </div>
        <div class="card">
            <h3>Easy</h3>
            <p>Simple and easy to use interface.</p>
        </div>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 MyWebsite | All Rights Reserved</p>
</footer>

<script>
    function showAlert() {
        alert("Welcome! Button clicked successfully 🎉");
    }
</script>

</body>
</html>
